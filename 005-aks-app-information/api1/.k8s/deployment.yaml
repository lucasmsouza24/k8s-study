apiVersion: apps/v1
kind: Deployment
metadata:
  name: api1-__ENV__
  labels:
    app: api1-__ENV__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api1-__ENV__
  template:
    metadata:
      labels:
        app: api1-__ENV__
    spec:
      containers:
      - name: api1-__ENV__
        image: __IMAGE__
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 100m
            memory: 256Mi
